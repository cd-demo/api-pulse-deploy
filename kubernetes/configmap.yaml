apiVersion: v1
kind: ConfigMap
metadata:
  name: api-pulse-config
  namespace: api-pulse
data:
  DB_HOST: "mysql"
  DB_PORT: "3306"
  DB_USER: "apipulse"
  REGISTRY_DB: "api_pulse_registry"
  AUTH_VERSION: "1.0.0"
  ANALYTICS_VERSION: "1.0.0"
  UI_VERSION: "1.0.0"
  UI_THEME_COLOR: "#0F766E"
  # Browser-reachable base URLs via Ingress path prefixes
  AUTH_URL: "http://api-pulse.local/auth"
  ANALYTICS_URL: "http://api-pulse.local/analytics"
