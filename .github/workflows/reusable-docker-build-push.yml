# Reusable: build a Docker image and push it to Docker Hub.
#
# Uses plain `docker build` / `docker push` (no Buildx / buildkit pull).
# That avoids EOF failures when self-hosted runners cannot pull moby/buildkit.
#
# Required secrets in the *caller* repo (or org):
#   DOCKERHUB_USERNAME
#   DOCKERHUB_TOKEN   (Docker Hub Access Token, not account password)

name: Reusable Docker Build & Push

on:
  workflow_call:
    inputs:
      image_name:
        description: "Full image name without tag (e.g. rijantakar1/api-pulse-web)"
        required: true
        type: string
      context:
        description: "Docker build context path"
        required: false
        type: string
        default: "."
      dockerfile:
        description: "Path to Dockerfile relative to context"
        required: false
        type: string
        default: "Dockerfile"
      build_args:
        description: "Newline-separated KEY=VALUE build-args (optional)"
        required: false
        type: string
        default: ""
      runs_on:
        description: "JSON array of runner labels (default: self-hosted beacon Mac)"
        required: false
        type: string
        default: '["self-hosted", "macOS", "X64", "beacon"]'
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true
    outputs:
      image_tags:
        description: "Newline-separated tags that were pushed"
        value: ${{ jobs.build-and-push.outputs.tags }}
      image_digest:
        description: "Image digest"
        value: ${{ jobs.build-and-push.outputs.digest }}

permissions:
  contents: read

jobs:
  build-and-push:
    name: Build & push
    runs-on: ${{ fromJSON(inputs.runs_on) }}
    outputs:
      tags: ${{ steps.version.outputs.tags }}
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4

      - name: Verify Docker is available
        shell: bash
        run: |
          set -euo pipefail
          docker version
          docker info >/dev/null

      - name: Log in to Docker Hub
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

      - name: Derive version tags
        id: version
        shell: bash
        run: |
          set -euo pipefail
          REF="${GITHUB_REF_NAME}"
          SHA_SHORT="${GITHUB_SHA::7}"
          PKG_VERSION="1.0.0"
          if [[ -f package.json ]]; then
            if command -v node >/dev/null 2>&1; then
              PKG_VERSION="$(node -p "require('./package.json').version || '1.0.0'")"
            else
              PKG_VERSION="$(sed -n 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' package.json | head -1)"
              PKG_VERSION="${PKG_VERSION:-1.0.0}"
            fi
          fi

          SAFE_REF="$(echo "$REF" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9._-]+/-/g' | cut -c1-120)"

          TAGS=()
          if [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
            TAGS+=("${{ inputs.image_name }}:latest")
            TAGS+=("${{ inputs.image_name }}:${PKG_VERSION}")
            TAGS+=("${{ inputs.image_name }}:${PKG_VERSION}-${SHA_SHORT}")
            TAGS+=("${{ inputs.image_name }}:main-${SHA_SHORT}")
            echo "version=${PKG_VERSION}" >> "$GITHUB_OUTPUT"
          else
            TAGS+=("${{ inputs.image_name }}:${SAFE_REF}")
            TAGS+=("${{ inputs.image_name }}:${SAFE_REF}-${SHA_SHORT}")
            echo "version=${SAFE_REF}-${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          fi

          {
            echo "tags<<EOF"
            printf '%s\n' "${TAGS[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "Pushing tags:"
          printf '  - %s\n' "${TAGS[@]}"

      - name: Build image
        id: build
        shell: bash
        run: |
          set -euo pipefail
          CONTEXT="${{ inputs.context }}"
          DOCKERFILE="${CONTEXT}/${{ inputs.dockerfile }}"
          PRIMARY_TAG="$(echo "${{ steps.version.outputs.tags }}" | head -n1)"

          BUILD_ARGS=()
          BUILD_ARGS+=(--build-arg "VERSION=${{ steps.version.outputs.version }}")
          while IFS= read -r line; do
            [[ -z "$line" ]] && continue
            BUILD_ARGS+=(--build-arg "$line")
          done <<< "${{ inputs.build_args }}"

          echo "Building ${PRIMARY_TAG} from ${DOCKERFILE}"
          docker build \
            -f "$DOCKERFILE" \
            "${BUILD_ARGS[@]}" \
            -t "$PRIMARY_TAG" \
            "$CONTEXT"

          # Apply remaining tags to the same image
          while IFS= read -r tag; do
            [[ -z "$tag" || "$tag" == "$PRIMARY_TAG" ]] && continue
            docker tag "$PRIMARY_TAG" "$tag"
          done <<< "${{ steps.version.outputs.tags }}"

          echo "primary=${PRIMARY_TAG}" >> "$GITHUB_OUTPUT"

      - name: Push image tags
        id: push
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [[ -z "$tag" ]] && continue
            echo "Pushing ${tag}"
            docker push "$tag"
          done <<< "${{ steps.version.outputs.tags }}"

          DIGEST="$(docker inspect --format='{{index .RepoDigests 0}}' "${{ steps.build.outputs.primary }}" 2>/dev/null || true)"
          echo "digest=${DIGEST:-unknown}" >> "$GITHUB_OUTPUT"

      - name: Summary
        shell: bash
        run: |
          {
            echo "### Docker image pushed"
            echo ""
            echo "- **Image:** \`${{ inputs.image_name }}\`"
            echo "- **Digest:** \`${{ steps.push.outputs.digest }}\`"
            echo "- **Tags:**"
            while IFS= read -r line; do
              [[ -n "$line" ]] && echo "- \`$line\`"
            done <<< "${{ steps.version.outputs.tags }}"
          } >> "$GITHUB_STEP_SUMMARY"
