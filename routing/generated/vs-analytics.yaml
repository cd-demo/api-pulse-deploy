apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: api-pulse-analytics
  namespace: api-pulse
  labels:
    app.kubernetes.io/name: api-pulse
    app.kubernetes.io/part-of: odin
    odin.cd-demo.io/service: analytics
spec:
  hosts:
  - '*'
  gateways:
  - api-pulse/api-pulse-gateway
  http:
  - match:
    - headers:
        x-tenant-slug:
          exact: acme
      uri:
        prefix: /analytics
    route:
    - destination:
        host: api-pulse-analytics-latest.api-pulse.svc.cluster.local
        port:
          number: 80
    rewrite:
      uriRegexRewrite:
        match: ^/analytics(/|$)(.*)
        rewrite: /\2
  - match:
    - headers:
        x-tenant-slug:
          exact: globex
      uri:
        prefix: /analytics
    route:
    - destination:
        host: api-pulse-analytics-latest.api-pulse.svc.cluster.local
        port:
          number: 80
    rewrite:
      uriRegexRewrite:
        match: ^/analytics(/|$)(.*)
        rewrite: /\2
  - match:
    - uri:
        prefix: /analytics
    rewrite:
      uriRegexRewrite:
        match: ^/analytics(/|$)(.*)
        rewrite: /\2
    route:
    - destination:
        host: api-pulse-analytics-latest.api-pulse.svc.cluster.local
        port:
          number: 80
